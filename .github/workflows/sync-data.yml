name: Sync Fuel Data

on:
  schedule:
    - cron: "*/15 * * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to fetch in YYYY-MM-DD (optional)"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      downloaded: ${{ steps.download.outputs.downloaded }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Check schedule window (Europe/Vilnius)
        id: window
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DAY="$(TZ=Europe/Vilnius date +%u)"
          HOUR="$(TZ=Europe/Vilnius date +%H)"
          if [ "$DAY" -ge 1 ] && [ "$DAY" -le 5 ] && [ "$HOUR" -ge 10 ] && [ "$HOUR" -le 16 ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "Outside allowed schedule window (Mon-Fri, 10:00-16:59 Europe/Vilnius)."
          fi

      - name: Discover and download ENA XLSX
        id: download
        if: steps.window.outputs.allowed == 'true'
        run: |
          TARGET_DATE="${{ github.event.inputs.date }}"
          PAGE_URL="https://www.ena.lt/degalu-kainos-degalinese/"
          MARKER_PATH=".github/state/ena-sharepoint-url-state.json"
          mkdir -p data

          echo "Discovering ENA SharePoint source from: $PAGE_URL"
          DISCOVERY_ARGS=(--page-url "$PAGE_URL" --format tsv)
          if [ -n "$TARGET_DATE" ]; then
            DISCOVERY_ARGS+=(--date "$TARGET_DATE")
          fi
          if ! DISCOVERY_LINE="$(node scripts/discover-ena-source.mjs "${DISCOVERY_ARGS[@]}")"
          then
            echo "downloaded=false" >> "$GITHUB_OUTPUT"
            if [ -n "$TARGET_DATE" ]; then
              echo "No SharePoint source found for requested date $TARGET_DATE."
            else
              echo "No SharePoint source found on ENA page."
            fi
            exit 0
          fi

          IFS=$'\t' read -r DATE_ISO SOURCE_URL _ <<< "$DISCOVERY_LINE"
          if [ -z "$TARGET_DATE" ] && [ -f "$MARKER_PATH" ]; then
            LAST_STATE="$(python3 - "$MARKER_PATH" <<'PY'
import json
import sys
from pathlib import Path
path = Path(sys.argv[1])
try:
    data = json.loads(path.read_text(encoding="utf-8"))
except Exception:
    print("\t")
    raise SystemExit(0)
print(f"{data.get('date', '')}\t{data.get('source_url', '')}")
PY
            )"
            IFS=$'\t' read -r LAST_DATE LAST_URL <<< "$LAST_STATE"
            if [ "$LAST_DATE" = "$DATE_ISO" ] && [ "$LAST_URL" = "$SOURCE_URL" ]; then
              echo "downloaded=false" >> "$GITHUB_OUTPUT"
              echo "SharePoint URL for $DATE_ISO already processed, skipping repeat run."
              exit 0
            fi
          fi

          DEST="data/dk-${DATE_ISO}.xlsx"
          echo "date=$DATE_ISO" >> "$GITHUB_OUTPUT"
          echo "source_url=$SOURCE_URL" >> "$GITHUB_OUTPUT"

          case "$SOURCE_URL" in
            *\?*) DOWNLOAD_URL="${SOURCE_URL}&download=1" ;;
            *) DOWNLOAD_URL="${SOURCE_URL}?download=1" ;;
          esac

          echo "Downloading SharePoint file for $DATE_ISO"
          COOKIE_JAR="$(mktemp)"
          if curl -fL -A "Mozilla/5.0" -c "$COOKIE_JAR" -b "$COOKIE_JAR" "$DOWNLOAD_URL" -o "$DEST"; then
            if python3 - "$DEST" <<'PY'
import sys
with open(sys.argv[1], "rb") as handle:
    header = handle.read(2)
if header != b"PK":
    raise SystemExit(1)
PY
            then
              echo "downloaded=true" >> "$GITHUB_OUTPUT"
              echo "file=$DEST" >> "$GITHUB_OUTPUT"
              rm -f "$COOKIE_JAR"
            else
              rm -f "$DEST"
              echo "downloaded=false" >> "$GITHUB_OUTPUT"
              echo "Downloaded content was not an XLSX file."
              rm -f "$COOKIE_JAR"
            fi
          else
            echo "downloaded=false" >> "$GITHUB_OUTPUT"
            echo "Failed to download SharePoint file: $DOWNLOAD_URL"
            rm -f "$COOKIE_JAR"
          fi

      - name: Install dependencies
        if: steps.download.outputs.downloaded == 'true'
        run: npm ci

      - name: Rebuild data and site
        if: steps.download.outputs.downloaded == 'true'
        run: |
          npm run build:data
          npm run build

      - name: Remove downloaded spreadsheet
        if: steps.download.outputs.downloaded == 'true'
        run: rm -f data/dk-*.xlsx

      - name: Update daily SharePoint marker
        if: steps.download.outputs.downloaded == 'true'
        run: |
          mkdir -p .github/state
          python3 - <<'PY' "${{ steps.download.outputs.date }}" "${{ steps.download.outputs.source_url }}"
import json
import sys
from datetime import datetime, timezone
from pathlib import Path
date_iso = sys.argv[1]
source_url = sys.argv[2]
payload = {
    "date": date_iso,
    "source_url": source_url,
    "marked_at": datetime.now(timezone.utc).isoformat(),
}
Path(".github/state/ena-sharepoint-url-state.json").write_text(
    json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
    encoding="utf-8",
)
PY

      - name: Commit and push updates
        if: steps.download.outputs.downloaded == 'true'
        run: |
          git add data/geocode-cache.json src/data .github/state/ena-sharepoint-url-state.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): sync ENA fuel data for ${{ steps.download.outputs.date }}"
          git push origin HEAD:main

      - name: Upload Pages artifact
        if: steps.download.outputs.downloaded == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: sync
    if: needs.sync.outputs.downloaded == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
