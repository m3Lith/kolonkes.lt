name: Sync Fuel Data

on:
  schedule:
    - cron: "*/15 10-16 * * 1-5"
      timezone: "Europe/Vilnius"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to fetch in YYYY-MM-DD (optional)"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      downloaded: ${{ steps.download.outputs.downloaded }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Discover and download ENA XLSX
        id: download
        run: |
          TARGET_DATE="${{ github.event.inputs.date }}"
          PAGE_URL="https://www.ena.lt/degalu-kainos-degalinese/"
          MARKER_PATH=".github/state/ena-sharepoint-url-state.json"
          mkdir -p data

          echo "Discovering ENA SharePoint source from: $PAGE_URL"
          DISCOVERY_ARGS=(--page-url "$PAGE_URL" --format tsv)
          if [ -n "$TARGET_DATE" ]; then
            DISCOVERY_ARGS+=(--date "$TARGET_DATE")
          fi
          if ! DISCOVERY_LINE="$(node scripts/discover-ena-source.mjs "${DISCOVERY_ARGS[@]}")"
          then
            echo "downloaded=false" >> "$GITHUB_OUTPUT"
            if [ -n "$TARGET_DATE" ]; then
              echo "No SharePoint source found for requested date $TARGET_DATE."
            else
              echo "No SharePoint source found on ENA page."
            fi
            exit 0
          fi

          IFS=$'\t' read -r DATE_ISO SOURCE_URL _ <<< "$DISCOVERY_LINE"
          if [ -z "$TARGET_DATE" ] && [ -f "$MARKER_PATH" ]; then
            LAST_STATE="$(node scripts/workflow-utils.mjs read-marker "$MARKER_PATH")"
            IFS=$'\t' read -r LAST_DATE LAST_URL <<< "$LAST_STATE"
            if [ "$LAST_DATE" = "$DATE_ISO" ] && [ "$LAST_URL" = "$SOURCE_URL" ]; then
              echo "downloaded=false" >> "$GITHUB_OUTPUT"
              echo "SharePoint URL for $DATE_ISO already processed, skipping repeat run."
              exit 0
            fi
          fi

          DEST="data/dk-${DATE_ISO}.xlsx"
          echo "date=$DATE_ISO" >> "$GITHUB_OUTPUT"
          echo "source_url=$SOURCE_URL" >> "$GITHUB_OUTPUT"

          case "$SOURCE_URL" in
            *\?*) DOWNLOAD_URL="${SOURCE_URL}&download=1" ;;
            *) DOWNLOAD_URL="${SOURCE_URL}?download=1" ;;
          esac

          echo "Downloading SharePoint file for $DATE_ISO"
          COOKIE_JAR="$(mktemp)"
          if curl -fL -A "Mozilla/5.0" -c "$COOKIE_JAR" -b "$COOKIE_JAR" "$DOWNLOAD_URL" -o "$DEST"; then
            if node scripts/workflow-utils.mjs is-xlsx "$DEST"; then
              echo "downloaded=true" >> "$GITHUB_OUTPUT"
              echo "file=$DEST" >> "$GITHUB_OUTPUT"
              rm -f "$COOKIE_JAR"
            else
              rm -f "$DEST"
              echo "downloaded=false" >> "$GITHUB_OUTPUT"
              echo "Downloaded content was not an XLSX file."
              rm -f "$COOKIE_JAR"
            fi
          else
            echo "downloaded=false" >> "$GITHUB_OUTPUT"
            echo "Failed to download SharePoint file: $DOWNLOAD_URL"
            rm -f "$COOKIE_JAR"
          fi

      - name: Install dependencies
        if: steps.download.outputs.downloaded == 'true'
        run: npm ci

      - name: Rebuild data and site
        if: steps.download.outputs.downloaded == 'true'
        run: |
          npm run build:data
          npm run build

      - name: Remove downloaded spreadsheet
        if: steps.download.outputs.downloaded == 'true'
        run: rm -f data/dk-*.xlsx

      - name: Update daily SharePoint marker
        if: steps.download.outputs.downloaded == 'true'
        run: |
          node scripts/workflow-utils.mjs write-marker \
            ".github/state/ena-sharepoint-url-state.json" \
            "${{ steps.download.outputs.date }}" \
            "${{ steps.download.outputs.source_url }}"

      - name: Commit and push updates
        if: steps.download.outputs.downloaded == 'true'
        run: |
          git add data/geocode-cache.json src/data .github/state/ena-sharepoint-url-state.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): sync ENA fuel data for ${{ steps.download.outputs.date }}"
          git push origin HEAD:main

      - name: Upload Pages artifact
        if: steps.download.outputs.downloaded == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: sync
    if: needs.sync.outputs.downloaded == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
